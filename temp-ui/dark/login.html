<!DOCTYPE html>

<html class="dark" lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>BauhausPM | Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&amp;family=Work+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-on-surface": "#f1f1f1",
                        "secondary-container": "#65a1ff",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#ffb3b1",
                        "on-tertiary-fixed-variant": "#584400",
                        "surface-container-high": "#e8e8e8",
                        "inverse-primary": "#ffb3b1",
                        "on-primary-container": "#fffbff",
                        "outline-variant": "#e4bebc",
                        "surface-bright": "#f9f9f9",
                        "secondary-fixed-dim": "#aac7ff",
                        "on-primary-fixed": "#410007",
                        "inverse-surface": "#303030",
                        "tertiary": "#745b00",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#003671",
                        "on-surface-variant": "#5b403f",
                        "surface-dim": "#dadada",
                        "primary-container": "#db313f",
                        "on-tertiary-container": "#4f3d00",
                        "on-primary-fixed-variant": "#92001c",
                        "secondary-fixed": "#d6e3ff",
                        "on-surface": "#1b1b1b",
                        "background": "#f9f9f9",
                        "on-secondary-fixed": "#001b3e",
                        "on-tertiary-fixed": "#241a00",
                        "on-secondary": "#ffffff",
                        "error": "#ba1a1a",
                        "surface-container-low": "#f3f3f3",
                        "surface-container": "#eeeeee",
                        "secondary": "#065db7",
                        "on-error": "#ffffff",
                        "primary-fixed": "#ffdad8",
                        "surface-tint": "#bb152c",
                        "primary": "#b7102a",
                        "surface-variant": "#e2e2e2",
                        "on-secondary-fixed-variant": "#00458d",
                        "on-background": "#1b1b1b",
                        "surface": "#f9f9f9",
                        "tertiary-container": "#d0a600",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed-dim": "#f1c100",
                        "surface-container-highest": "#e2e2e2",
                        "outline": "#8f6f6e",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#ffe08b",
                        "on-error-container": "#93000a"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Work Sans"],
                        "label": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bauhaus-grid {
            background-image:
                    linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
                    linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="bg-stone-950 font-body text-stone-50 min-h-screen flex items-center justify-center overflow-hidden bauhaus-grid">
<!-- Abstract Geometric Background Elements -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none z-0">
    <div class="absolute top-10 left-10 w-32 h-32 border-8 border-stone-50 opacity-20"></div>
    <div class="absolute bottom-20 right-20 w-48 h-48 rounded-full bg-primary opacity-10"></div>
    <div class="absolute top-1/2 left-20 w-1 bg-primary h-64 -translate-y-1/2 opacity-30"></div>
    <div class="absolute top-40 right-40 w-64 h-4 bg-yellow-400 opacity-20 transform -rotate-45"></div>
</div>
<!-- Stark Centered Login Form -->
<main class="relative z-10 w-full max-w-md p-8 md:p-12">
    <div class="border-4 border-stone-50 bg-stone-950 p-10 shadow-[12px_12px_0px_0px_rgba(255,255,255,1)]">
        <!-- Brand Identity -->
        <div class="mb-12">
            <h1 class="font-headline text-5xl font-black uppercase tracking-tighter leading-none mb-2">
                Bauhaus<span class="text-primary">PM</span>
            </h1>
            <p class="font-headline font-bold text-xs uppercase tracking-widest text-stone-400">
                Project Management Systems / v2.0.4
            </p>
        </div>
        <!-- Login Interface -->
        <form class="space-y-8">
            <div class="space-y-6">
                <!-- Email Field -->
                <div class="group relative">
                    <label class="block font-headline font-bold text-xs uppercase tracking-widest mb-2 group-focus-within:text-primary transition-colors">
                        Account Email
                    </label>
                    <div class="relative">
                        <input class="w-full bg-transparent border-b-4 border-stone-800 focus:border-stone-50 focus:ring-0 text-lg font-headline font-medium uppercase transition-all px-0 py-2 placeholder:text-stone-800" placeholder="USER@BAUHAUS.PM" type="email"/>
                        <span class="material-symbols-outlined absolute right-0 bottom-3 text-stone-700">alternate_email</span>
                    </div>
                </div>
                <!-- Password Field -->
                <div class="group relative">
                    <label class="block font-headline font-bold text-xs uppercase tracking-widest mb-2 group-focus-within:text-primary transition-colors">
                        Access Key
                    </label>
                    <div class="relative">
                        <input class="w-full bg-transparent border-b-4 border-stone-800 focus:border-stone-50 focus:ring-0 text-lg font-headline font-medium transition-all px-0 py-2 placeholder:text-stone-800" placeholder="••••••••" type="password"/>
                        <span class="material-symbols-outlined absolute right-0 bottom-3 text-stone-700">lock</span>
                    </div>
                </div>
            </div>
            <!-- Primary Action -->
            <div class="pt-4">
                <button class="w-full group relative inline-flex items-center justify-center h-16 bg-primary border-4 border-stone-50 hover:bg-stone-50 hover:text-stone-950 transition-all active:translate-x-1 active:translate-y-1" type="submit">
                    <span class="font-headline font-black text-xl uppercase tracking-tighter">Login</span>
                    <span class="material-symbols-outlined ml-3 text-2xl" data-icon="arrow_forward">arrow_forward</span>
                </button>
                <div class="mt-8 flex justify-between items-center font-headline font-bold text-[10px] uppercase tracking-widest text-stone-500">
                    <a class="hover:text-primary transition-colors" href="#">Forgot Access</a>
                    <span class="w-8 h-[2px] bg-stone-800"></span>
                    <a class="hover:text-primary transition-colors" href="#">Request Account</a>
                </div>
            </div>
        </form>
    </div>
    <!-- Decorative Quote / Aesthetic Anchor -->
    <div class="mt-12 text-center">
        <p class="font-headline font-bold text-xs uppercase tracking-[0.3em] text-stone-600 leading-relaxed">
            Form follows function.<br/>The system dictates progress.
        </p>
    </div>
</main>
<!-- Footer Identity Bar -->
<div class="fixed bottom-0 left-0 w-full h-2 bg-primary"></div>
<div class="fixed top-0 left-0 w-2 h-full bg-stone-50"></div>
</body></html>
