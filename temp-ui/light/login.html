<!DOCTYPE html>

<html class="light" lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>BauhausPM - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&amp;family=Work+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-on-surface": "#f1f1f1",
                        "secondary-container": "#65a1ff",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#ffb3b1",
                        "on-tertiary-fixed-variant": "#584400",
                        "surface-container-high": "#e8e8e8",
                        "inverse-primary": "#ffb3b1",
                        "on-primary-container": "#fffbff",
                        "outline-variant": "#e4bebc",
                        "surface-bright": "#f9f9f9",
                        "secondary-fixed-dim": "#aac7ff",
                        "on-primary-fixed": "#410007",
                        "inverse-surface": "#303030",
                        "tertiary": "#745b00",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#003671",
                        "on-surface-variant": "#5b403f",
                        "surface-dim": "#dadada",
                        "primary-container": "#db313f",
                        "on-tertiary-container": "#4f3d00",
                        "on-primary-fixed-variant": "#92001c",
                        "secondary-fixed": "#d6e3ff",
                        "on-surface": "#1b1b1b",
                        "background": "#f9f9f9",
                        "on-secondary-fixed": "#001b3e",
                        "on-tertiary-fixed": "#241a00",
                        "on-secondary": "#ffffff",
                        "error": "#ba1a1a",
                        "surface-container-low": "#f3f3f3",
                        "surface-container": "#eeeeee",
                        "secondary": "#065db7",
                        "on-error": "#ffffff",
                        "primary-fixed": "#ffdad8",
                        "surface-tint": "#bb152c",
                        "primary": "#b7102a",
                        "surface-variant": "#e2e2e2",
                        "on-secondary-fixed-variant": "#00458d",
                        "on-background": "#1b1b1b",
                        "surface": "#f9f9f9",
                        "tertiary-container": "#d0a600",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed-dim": "#f1c100",
                        "surface-container-highest": "#e2e2e2",
                        "outline": "#8f6f6e",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#ffe08b",
                        "on-error-container": "#93000a"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Work Sans"],
                        "label": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bauhaus-grid {
            background-image:
                    linear-gradient(to right, #e2e2e2 1px, transparent 1px),
                    linear-gradient(to bottom, #e2e2e2 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="bg-background font-body text-on-background min-h-screen flex items-center justify-center p-6 bauhaus-grid">
<!-- Top Left Branding (Persistent but minimal) -->
<div class="fixed top-10 left-10 flex flex-col">
    <span class="font-headline text-4xl font-black text-stone-900 tracking-tighter uppercase leading-none">BauhausPM</span>
    <div class="h-2 w-24 bg-primary mt-2"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-md relative">
    <!-- Decorative Background Shapes (Bauhaus Aesthetic) -->
    <div class="absolute -top-12 -right-12 w-24 h-24 bg-tertiary-container rounded-full border-4 border-stone-900 z-0"></div>
    <div class="absolute -bottom-8 -left-8 w-16 h-16 bg-secondary border-4 border-stone-900 z-0"></div>
    <!-- Main Form Card -->
    <div class="bg-white border-4 border-stone-900 p-8 md:p-12 shadow-[12px_12px_0px_0px_rgba(27,27,27,1)] relative z-10">
        <header class="mb-10">
            <h1 class="font-headline text-5xl font-black text-stone-900 uppercase tracking-tighter mb-2">Login</h1>
            <p class="font-label text-stone-500 font-bold uppercase text-xs tracking-widest">Access your workflow</p>
        </header>
        <form action="#" class="space-y-6">
            <!-- Username Field -->
            <div class="space-y-2">
                <label class="font-label font-bold uppercase text-sm text-stone-900 block" for="username">Username</label>
                <div class="relative">
                    <input class="w-full border-4 border-stone-900 px-4 py-3 font-headline font-bold focus:ring-0 focus:outline-none focus:bg-yellow-50 transition-colors placeholder:text-stone-300" id="username" name="username" placeholder="ARCHITECT_01" type="text"/>
                    <div class="absolute right-3 top-1/2 -translate-y-1/2">
                        <span class="material-symbols-outlined text-stone-900" data-icon="account_circle">account_circle</span>
                    </div>
                </div>
            </div>
            <!-- Password Field -->
            <div class="space-y-2">
                <label class="font-label font-bold uppercase text-sm text-stone-900 block" for="password">Password</label>
                <div class="relative">
                    <input class="w-full border-4 border-stone-900 px-4 py-3 font-headline font-bold focus:ring-0 focus:outline-none focus:bg-yellow-50 transition-colors placeholder:text-stone-300" id="password" name="password" placeholder="••••••••" type="password"/>
                    <div class="absolute right-3 top-1/2 -translate-y-1/2">
                        <span class="material-symbols-outlined text-stone-900" data-icon="lock">lock</span>
                    </div>
                </div>
            </div>
            <!-- Remember & Forgot -->
            <div class="flex items-center justify-between font-label text-xs font-bold uppercase tracking-tight">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <input class="w-5 h-5 border-4 border-stone-900 text-primary focus:ring-0 rounded-none cursor-pointer" type="checkbox"/>
                    <span class="group-hover:text-primary transition-colors">Remember Me</span>
                </label>
                <a class="text-stone-400 hover:text-stone-900 underline decoration-2 underline-offset-4" href="#">Forgot Password?</a>
            </div>
            <!-- Primary Login Button -->
            <button class="w-full bg-primary text-white border-4 border-stone-900 py-4 font-headline font-black uppercase text-xl tracking-tighter shadow-[6px_6px_0px_0px_rgba(27,27,27,1)] active:translate-x-1 active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-2 group" type="submit">
                Enter Dashboard
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
            </button>
        </form>
        <!-- Secondary Actions -->
        <footer class="mt-10 pt-8 border-t-4 border-stone-900 flex flex-col items-center gap-4">
            <p class="font-label text-xs font-bold uppercase text-stone-400">New to the system?</p>
            <button class="w-full border-4 border-stone-900 bg-white py-3 font-headline font-bold uppercase text-sm tracking-widest hover:bg-stone-900 hover:text-white transition-colors">
                Request Credentials
            </button>
        </footer>
    </div>
    <!-- Geometric Accents -->
    <div class="mt-8 flex justify-between items-center px-4">
        <div class="flex gap-2">
            <div class="w-4 h-4 bg-primary border-2 border-stone-900"></div>
            <div class="w-4 h-4 bg-tertiary border-2 border-stone-900"></div>
            <div class="w-4 h-4 bg-secondary border-2 border-stone-900"></div>
        </div>
        <span class="font-headline font-black text-stone-900 text-sm tracking-widest uppercase">Form Follows Function</span>
    </div>
</main>
<!-- Bottom Decorative Strip -->
<div class="fixed bottom-0 left-0 w-full h-4 bg-stone-900 flex">
    <div class="h-full w-1/3 bg-primary border-r-4 border-stone-900"></div>
    <div class="h-full w-1/4 bg-secondary border-r-4 border-stone-900"></div>
    <div class="h-full w-1/6 bg-tertiary-container border-r-4 border-stone-900"></div>
    <div class="h-full flex-grow bg-white"></div>
</div>
</body></html>
