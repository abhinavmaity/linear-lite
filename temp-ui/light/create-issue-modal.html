<!DOCTYPE html>

<html class="light" lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>BauhausPM - Create Issue</title>

                        "surface-dim": "#dadada",
                        "primary-container": "#db313f",

                        "on-primary-fixed-variant": "#92001c",
                        "secondary-fixed": "#d6e3ff",
                        "on-surface": "#1b1b1b",

                        "on-tertiary-fixed": "#241a00",

                        "error": "#ba1a1a",

                        "on-secondary-fixed-variant": "#00458d",
                        "on-background": "#1b1b1b",
                        "surface": "#f9f9f9",
                        "tertiary-container": "#d0a600",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed-dim": "#f1c100",
                        "surface-container-highest": "#e2e2e2",
                        "outline": "#8f6f6e",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#ffe08b",
                        "on-error-container": "#93000a"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Work Sans"],
                        "label": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                    letterSpacing: {
                        "tightest": "-.075em",
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Work Sans', sans-serif;
            background-color: #f9f9f9;
        }
        .bauhaus-shadow {
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
        }
        .bauhaus-shadow-sm {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen">
<!-- TopNavBar Implementation from JSON -->
<nav class="fixed top-0 w-full border-b-4 border-stone-900 dark:border-stone-50 z-50 bg-white dark:bg-stone-950 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] dark:shadow-[4px_4px_0px_0px_rgba(255,255,255,0.2)] flex justify-between items-center h-16 px-6 w-full">
    <div class="flex items-center gap-8">
        <span class="text-2xl font-black text-stone-900 dark:text-stone-50 tracking-tightest font-['Space_Grotesk'] uppercase tracking-tighter font-bold">BauhausPM</span>
        <div class="hidden md:flex items-center gap-6">
            <a class="text-[#E63946] border-b-4 border-[#E63946] font-['Space_Grotesk'] uppercase tracking-tighter font-bold h-16 flex items-center" href="#">Issues</a>
            <a class="text-stone-600 dark:text-stone-400 font-['Space_Grotesk'] uppercase tracking-tighter font-bold hover:bg-[#E63946] hover:text-white transition-colors duration-100 h-16 px-4 flex items-center" href="#">Board</a>
            <a class="text-stone-600 dark:text-stone-400 font-['Space_Grotesk'] uppercase tracking-tighter font-bold hover:bg-[#E63946] hover:text-white transition-colors duration-100 h-16 px-4 flex items-center" href="#">Projects</a>
        </div>
    </div>
    <div class="flex items-center gap-4">
        <button class="bg-primary text-on-primary font-['Space_Grotesk'] font-bold uppercase px-4 py-2 border-2 border-stone-900 bauhaus-shadow-sm active:translate-x-1 active:translate-y-1 active:shadow-none transition-all duration-75">
            Create Issue
        </button>
        <div class="flex gap-2">
            <span class="material-symbols-outlined p-2 hover:bg-yellow-400 border-2 border-transparent hover:border-stone-900 transition-all cursor-pointer" data-icon="notifications">notifications</span>
            <span class="material-symbols-outlined p-2 hover:bg-yellow-400 border-2 border-transparent hover:border-stone-900 transition-all cursor-pointer" data-icon="account_circle">account_circle</span>
        </div>
    </div>
</nav>
<!-- SideNavBar Implementation from JSON -->
<aside class="fixed left-0 top-0 h-full w-64 border-r-4 border-stone-900 dark:border-stone-50 bg-stone-50 dark:bg-stone-900 flex flex-col h-full pt-20 pb-6 z-40 hidden lg:flex">
    <div class="px-6 mb-8">
        <h2 class="text-xl font-black text-stone-900 dark:text-white font-['Space_Grotesk']">Project Alpha</h2>
        <p class="text-xs font-bold text-stone-500 font-['Space_Grotesk']">v2.0.4</p>
    </div>
    <nav class="flex-1">
        <ul class="space-y-0">
            <li>
                <a class="flex items-center gap-3 px-4 py-3 text-stone-900 dark:text-stone-300 font-['Space_Grotesk'] font-bold text-sm uppercase hover:bg-yellow-400 dark:hover:bg-blue-600 transition-all duration-75" href="#">
                    <span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
                    Dashboard
                </a>
            </li>
            <li>
                <a class="bg-[#E63946] text-white dark:text-stone-950 border-y-2 border-stone-900 dark:border-stone-50 flex items-center gap-3 px-4 py-3 font-['Space_Grotesk'] font-bold text-sm uppercase" href="#">
                    <span class="material-symbols-outlined" data-icon="list_alt">list_alt</span>
                    Issues
                </a>
            </li>
            <li>
                <a class="flex items-center gap-3 px-4 py-3 text-stone-900 dark:text-stone-300 font-['Space_Grotesk'] font-bold text-sm uppercase hover:bg-yellow-400 dark:hover:bg-blue-600 transition-all duration-75" href="#">
                    <span class="material-symbols-outlined" data-icon="view_kanban">view_kanban</span>
                    Board
                </a>
            </li>
            <li>
                <a class="flex items-center gap-3 px-4 py-3 text-stone-900 dark:text-stone-300 font-['Space_Grotesk'] font-bold text-sm uppercase hover:bg-yellow-400 dark:hover:bg-blue-600 transition-all duration-75" href="#">
                    <span class="material-symbols-outlined" data-icon="folder_special">folder_special</span>
                    Projects
                </a>
            </li>
            <li>
                <a class="flex items-center gap-3 px-4 py-3 text-stone-900 dark:text-stone-300 font-['Space_Grotesk'] font-bold text-sm uppercase hover:bg-yellow-400 dark:hover:bg-blue-600 transition-all duration-75" href="#">
                    <span class="material-symbols-outlined" data-icon="bolt">bolt</span>
                    Sprints
                </a>
            </li>
        </ul>
    </nav>
    <div class="px-4 mt-auto">
        <button class="w-full bg-stone-900 text-white py-3 border-2 border-stone-900 font-['Space_Grotesk'] font-bold uppercase bauhaus-shadow-sm hover:bg-stone-800 transition-all mb-8">
            New Sprint
        </button>
        <ul class="border-t-2 border-stone-200 pt-4">
            <li>
                <a class="flex items-center gap-3 px-4 py-2 text-stone-600 font-['Space_Grotesk'] font-bold text-xs uppercase hover:text-stone-900" href="#">
                    <span class="material-symbols-outlined text-lg" data-icon="settings">settings</span>
                    Settings
                </a>
            </li>
        </ul>
    </div>
</aside>
<!-- Main Content Canvas -->
<main class="lg:pl-64 pt-16 min-h-screen">
    <div class="p-8">
        <!-- Background Content (Simulating a dashboard behind the modal) -->
        <div class="max-w-6xl mx-auto opacity-40 pointer-events-none">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white border-4 border-stone-900 p-6 bauhaus-shadow h-40"></div>
                <div class="bg-white border-4 border-stone-900 p-6 bauhaus-shadow h-40"></div>
                <div class="bg-white border-4 border-stone-900 p-6 bauhaus-shadow h-40"></div>
                <div class="md:col-span-2 bg-white border-4 border-stone-900 p-6 bauhaus-shadow h-96"></div>
                <div class="bg-white border-4 border-stone-900 p-6 bauhaus-shadow h-96"></div>
            </div>
        </div>
    </div>
</main>
<!-- CREATE ISSUE MODAL OVERLAY -->
<div class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-stone-900/40 backdrop-blur-sm">
    <!-- Modal Container -->
    <div class="w-full max-w-2xl bg-white border-[6px] border-stone-900 bauhaus-shadow flex flex-col md:flex-row overflow-hidden">
        <!-- Left Accent Strip (Bauhaus Aesthetic) -->
        <div class="hidden md:flex flex-col w-16 border-r-[6px] border-stone-900">
            <div class="h-1/3 bg-[#E63946] border-b-[6px] border-stone-900"></div>
            <div class="h-1/3 bg-yellow-400 border-b-[6px] border-stone-900 flex items-center justify-center">
                <span class="material-symbols-outlined font-black text-stone-900" style="font-variation-settings: 'FILL' 1;">add</span>
            </div>
            <div class="h-1/3 bg-blue-600"></div>
        </div>
        <!-- Content Area -->
        <div class="flex-1 p-8">
            <!-- Modal Header -->
            <div class="flex justify-between items-start mb-8 border-b-4 border-stone-900 pb-4">
                <div>
                    <h2 class="font-headline font-black text-4xl uppercase tracking-tightest text-stone-900">Create Issue</h2>
                    <p class="font-label font-bold text-stone-500 uppercase text-xs mt-1">Project Alpha / Sprint 12</p>
                </div>
                <button class="p-2 border-2 border-stone-900 hover:bg-[#E63946] hover:text-white transition-colors">
                    <span class="material-symbols-outlined leading-none" data-icon="close">close</span>
                </button>
            </div>
            <!-- Form -->
            <form class="space-y-6">
                <!-- Title Input -->
                <div>
                    <label class="block font-headline font-bold uppercase text-sm mb-2 text-stone-900">Issue Title</label>
                    <input class="w-full border-4 border-stone-900 p-4 font-body focus:ring-0 focus:border-[#E63946] text-lg bg-stone-50" placeholder="Short summary of the task" type="text"/>
                </div>
                <!-- Description Input -->
                <div>
                    <label class="block font-headline font-bold uppercase text-sm mb-2 text-stone-900">Description</label>
                    <textarea class="w-full border-4 border-stone-900 p-4 font-body focus:ring-0 focus:border-[#E63946] bg-stone-50 resize-none" placeholder="Detail the steps to reproduce or acceptance criteria..." rows="4"></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Priority Selection -->
                    <div>
                        <label class="block font-headline font-bold uppercase text-sm mb-2 text-stone-900">Priority</label>
                        <div class="relative">
                            <select class="w-full border-4 border-stone-900 p-4 font-headline font-bold uppercase appearance-none bg-stone-50 focus:ring-0 focus:border-[#E63946] cursor-pointer">
                                <option>Low</option>
                                <option selected="">Medium</option>
                                <option>High</option>
                                <option>Urgent</option>
                            </select>
                            <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none">
                                <span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
                            </div>
                        </div>
                    </div>
                    <!-- Assignee Selection -->
                    <div>
                        <label class="block font-headline font-bold uppercase text-sm mb-2 text-stone-900">Assign To</label>
                        <div class="flex items-center border-4 border-stone-900 p-3 bg-stone-50">
                            <div class="w-8 h-8 bg-blue-600 border-2 border-stone-900 flex items-center justify-center text-white font-bold text-xs shrink-0">JD</div>
                            <input class="ml-3 w-full border-none p-0 focus:ring-0 font-body font-medium bg-transparent" type="text" value="Jane Doe"/>
                            <span class="material-symbols-outlined text-stone-400" data-icon="search">search</span>
                        </div>
                    </div>
                </div>
                <!-- Action Buttons -->
                <div class="flex flex-col sm:flex-row gap-4 pt-6">
                    <button class="flex-1 px-8 py-4 border-4 border-stone-900 font-headline font-black uppercase tracking-widest hover:bg-stone-100 transition-colors order-2 sm:order-1" type="button">
                        Cancel
                    </button>
                    <button class="flex-1 px-8 py-4 bg-primary text-on-primary border-4 border-stone-900 font-headline font-black uppercase tracking-widest bauhaus-shadow-sm active:translate-x-1 active:translate-y-1 active:shadow-none transition-all order-1 sm:order-2" type="submit">
                        Create Issue
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<!-- Decorative Bauhaus Element in Background -->
<div class="fixed bottom-0 right-0 w-64 h-64 -z-10 opacity-20 hidden md:block">
    <div class="absolute bottom-10 right-10 w-48 h-48 rounded-full border-[12px] border-blue-600"></div>
    <div class="absolute bottom-0 right-0 w-32 h-32 bg-yellow-400 border-[12px] border-stone-900"></div>
    <div class="absolute bottom-20 right-40 w-12 h-40 bg-[#E63946] -rotate-45 border-[6px] border-stone-900"></div>
</div>
</body></html>
